<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dra. Silvana Creste — Acesso restrito</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Carlito:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --porcelain:#F8F4EC; --card:#FFFFFF; --ink:#232A28; --body:#3E4644; --muted:#737A73;
    --olive-deep:#506440; --olive-deeper:#3E4F2F; --brass:#C8A45F; --terracotta:#C78062;
    --hair:#E3DCCD;
    --font:"Calibri Light","Calibri","Carlito","Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    --font-strong:"Calibri","Carlito","Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--porcelain);color:var(--body);font-family:var(--font);
    -webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;
    padding:1.4rem;line-height:1.6}
  ::selection{background:var(--olive-deep);color:#F6F2EB}

  .card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--hair);
    border-radius:14px;padding:clamp(1.8rem,5vw,2.6rem);position:relative;overflow:hidden;
    box-shadow:0 30px 70px -36px rgba(60,80,50,.45)}
  .card::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;
    background:linear-gradient(90deg,var(--olive-deep),var(--brass))}

  .brand{display:inline-flex;align-items:center;gap:.6rem;font-family:var(--font-strong);
    font-weight:700;color:var(--ink);font-size:1.02rem}
  .brand .dot{width:10px;height:10px;border-radius:2px;flex:none;
    background:linear-gradient(135deg,var(--olive-deep) 0 50%,var(--brass) 50% 100%)}

  .eyebrow{display:flex;align-items:center;gap:.5rem;font-family:var(--font-strong);font-weight:700;
    font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--terracotta);margin:1.7rem 0 .7rem}
  .eyebrow svg{width:14px;height:14px;flex:none}

  h1{font-family:var(--font-strong);font-weight:700;color:var(--ink);font-size:1.5rem;
    letter-spacing:-.01em;margin:0 0 .4rem;line-height:1.15}
  .sub{color:var(--muted);font-size:.98rem;margin:0 0 1.5rem}

  label{display:block;font-family:var(--font-strong);font-weight:700;font-size:.78rem;
    letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:0 0 .5rem}
  .field{display:flex;gap:.6rem}
  input[type=password],input[type=text]{flex:1;min-width:0;font:inherit;font-size:1rem;color:var(--ink);
    background:var(--porcelain);border:1px solid var(--hair);border-radius:9px;padding:.8rem .95rem;
    transition:border-color .16s,box-shadow .16s}
  input:focus{outline:none;border-color:var(--olive-deep);box-shadow:0 0 0 3px rgba(80,100,64,.16)}
  .reveal-btn{flex:none;background:none;border:1px solid var(--hair);border-radius:9px;width:46px;
    cursor:pointer;color:var(--muted);font-size:1rem;transition:border-color .16s,color .16s}
  .reveal-btn:hover{border-color:var(--olive-deep);color:var(--olive-deep)}

  button.submit{margin-top:1rem;width:100%;font-family:var(--font-strong);font-weight:700;font-size:1rem;
    color:#F6F2EB;background:var(--olive-deep);border:1px solid var(--olive-deep);border-radius:999px;
    padding:.85rem 1.2rem;cursor:pointer;transition:background .18s,transform .12s}
  button.submit:hover{background:var(--olive-deeper);transform:translateY(-1px)}
  button.submit:disabled{opacity:.6;cursor:default;transform:none}

  .err{margin-top:.9rem;color:var(--terracotta);font-size:.92rem;min-height:1.2em;
    opacity:0;transition:opacity .15s}
  .err.show{opacity:1}

  .foot{margin-top:1.6rem;padding-top:1.1rem;border-top:1px solid var(--hair);
    font-family:var(--font-strong);font-size:.72rem;letter-spacing:.04em;color:var(--muted);
    display:flex;align-items:center;gap:.5rem}
  .foot svg{width:12px;height:12px;flex:none;color:var(--olive-deep)}

  *:focus-visible{outline:2px solid var(--brass);outline-offset:3px}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <main class="card" role="main">
    <span class="brand"><span class="dot"></span> Dra. Silvana Creste</span>

    <p class="eyebrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Acesso restrito
    </p>

    <h1>Conteúdo protegido</h1>
    <p class="sub">Digite a senha para visualizar a página.</p>

    <label for="pw">Senha</label>
    <div class="field">
      <input id="pw" type="password" autocomplete="current-password" autofocus
             placeholder="••••••••" aria-describedby="err">
      <button class="reveal-btn" id="toggle" type="button" aria-label="Mostrar senha" title="Mostrar senha">&#128065;</button>
    </div>
    <button class="submit" id="go" type="button">Entrar</button>
    <p class="err" id="err" role="alert"></p>

    <div class="foot">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Página criptografada de ponta a ponta
    </div>
  </main>

  var ITER     = 250000;

  var pw = document.getElementById('pw');
  var go = document.getElementById('go');
  var err = document.getElementById('err');
  var toggle = document.getElementById('toggle');

  function fromB64(s){ var bin=atob(s); var b=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++) b[i]=bin.charCodeAt(i); return b; }
  function showErr(msg){ err.textContent=msg; err.classList.add('show'); }
  function clearErr(){ err.classList.remove('show'); }

  toggle.addEventListener('click', function(){
    var t = pw.type === 'password' ? 'text' : 'password';
    pw.type = t;
    toggle.setAttribute('aria-label', t==='text'?'Ocultar senha':'Mostrar senha');
    toggle.setAttribute('title', t==='text'?'Ocultar senha':'Mostrar senha');
    pw.focus();
  });

  async function unlock(){
    clearErr();
    var password = pw.value;
    if(!password){ showErr('Digite a senha.'); pw.focus(); return; }
    if(!(window.crypto && window.crypto.subtle)){
      showErr('Seu navegador não suporta a verificação. Abra a página por HTTPS.'); return;
    }
    go.disabled = true; var label = go.textContent; go.textContent = 'Verificando…';
    try{
      var enc = new TextEncoder();
      var baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
      var key = await crypto.subtle.deriveKey(
        { name:'PBKDF2', salt: fromB64(SALT_B64), iterations: ITER, hash:'SHA-256' },
        baseKey, { name:'AES-GCM', length:256 }, false, ['decrypt']);
      var ptBuf = await crypto.subtle.decrypt(
        { name:'AES-GCM', iv: fromB64(IV_B64) }, key, fromB64(CT_B64));
      var html = new TextDecoder().decode(ptBuf);
      document.open(); document.write(html); document.close();
    }catch(e){
      go.disabled = false; go.textContent = label;
      showErr('Senha incorreta. Tente novamente.');
      pw.value=''; pw.focus();
    }
  }

  go.addEventListener('click', unlock);
  pw.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); unlock(); } });
  pw.focus();
})();
</script>
